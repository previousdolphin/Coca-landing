<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoCA // CHROME_LOGO</title>
    
    <!-- Three.js Base -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Three.js SVG Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/SVGLoader.js"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            /* Radial red gradient background matching the reference image */
            background: radial-gradient(circle at center, #ff2a2a 0%, #aa0000 80%, #660000 100%);
            font-family: 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            cursor: grab;
        }
        
        body:active {
            cursor: grabbing;
        }

        #canvas-container { 
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        #loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 4px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="loading-text">LOADING_VECTOR_DATA...</div>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, logoGroup;
        
        // Interaction state
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationVelocity = { x: 0, y: 0.01 }; // Auto-spin defaults

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Scene Setup
            scene = new THREE.Scene();
            // We leave scene.background as null so the CSS gradient shows through

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 0, 800); // Backed out to see the whole logo

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // 4. Lighting & Environment (The secret to Chrome)
            // Ambient light for base illumination
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            // Directional lights acting as "studio lights" reflecting off the chrome
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight1.position.set(100, 200, 100);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight2.position.set(-100, -200, -100);
            scene.add(dirLight2);

            // Generate Procedural Environment Map for Reflections
            const envMap = createChromeEnvironmentMap();

            // 5. The Chrome Material
            const chromeMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                metalness: 1.0,     // 100% metal
                roughness: 0.1,     // Very smooth/polished
                envMap: envMap,     // Apply our custom reflection map
                envMapIntensity: 1.5
            });

            // 6. Load and Extrude the SVG
            loadSVGLogo(chromeMaterial);

            // 7. Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            
            // Mouse / Touch Interaction
            renderer.domElement.addEventListener('mousedown', onPointerDown);
            renderer.domElement.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);
            
            renderer.domElement.addEventListener('touchstart', (e) => onPointerDown(e.touches[0]), { passive: false });
            renderer.domElement.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e.touches[0]); }, { passive: false });
            window.addEventListener('touchend', onPointerUp);
        }

        // Creates a fake "horizon" texture to give the metal something to reflect
        function createChromeEnvironmentMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            
            // Draw a studio lighting gradient (Sky -> Horizon -> Ground)
            const gradient = context.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0.0, '#ffffff'); // Overhead light
            gradient.addColorStop(0.4, '#cccccc'); // Sky
            gradient.addColorStop(0.49, '#222222'); // Dark horizon band
            gradient.addColorStop(0.51, '#555555'); // Ground reflection
            gradient.addColorStop(1.0, '#111111'); // Dark underside

            context.fillStyle = gradient;
            context.fillRect(0, 0, 512, 512);

            const texture = new THREE.CanvasTexture(canvas);
            texture.mapping = THREE.EquirectangularReflectionMapping;
            return texture;
        }

        function loadSVGLogo(material) {
            const loader = new THREE.SVGLoader();
            
            // Attempt to load the specific SVG
            loader.load(
                'CoCA-Vector-redrawn-photoshop.svg',
                function (data) {
                    document.getElementById('loading-text').style.display = 'none';
                    buildExtrudedLogo(data.paths, material);
                },
                undefined,
                function (error) {
                    console.error("SVG not found. Ensure 'CoCA-Vector-redrawn-photoshop.svg' is in the same directory.");
                    document.getElementById('loading-text').innerText = "SVG FILE NOT FOUND";
                }
            );
        }

        function buildExtrudedLogo(paths, material) {
            logoGroup = new THREE.Group();

            // Extrusion settings - defines the 3D depth and bevels
            const extrudeSettings = {
                depth: 15,          // Thickness of the logo
                bevelEnabled: true, // Smooth edges to catch light
                bevelThickness: 3,
                bevelSize: 1.5,
                bevelOffset: 0,
                bevelSegments: 4,
                curveSegments: 24   // High quality curves
            };

            // Convert SVG paths to 3D Geometry
            for (let i = 0; i < paths.length; i++) {
                const path = paths[i];
                // Some SVGs use strokes instead of fills. This tries to handle both.
                const shapes = THREE.SVGLoader.createShapes(path);

                for (let j = 0; j < shapes.length; j++) {
                    const shape = shapes[j];
                    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    const mesh = new THREE.Mesh(geometry, material);
                    logoGroup.add(mesh);
                }
            }

            // Center the entire parsed geometry
            const boundingBox = new THREE.Box3().setFromObject(logoGroup);
            const center = boundingBox.getCenter(new THREE.Vector3());
            const size = boundingBox.getSize(new THREE.Vector3());

            // Offset children to center them inside the group
            logoGroup.children.forEach(child => {
                child.position.x -= center.x;
                child.position.y -= center.y;
                child.position.z -= center.z;
            });

            // SVG coordinates map Y downwards. We need to flip it upright.
            logoGroup.scale.y = -1;
            
            // Automatically scale the logo to fit nicely in view regardless of original SVG size
            const maxDim = Math.max(size.x, size.y);
            const scaleFactor = 300 / maxDim; // Target size is roughly 300 units wide
            logoGroup.scale.set(scaleFactor, -scaleFactor, scaleFactor);

            scene.add(logoGroup);
        }

        // --- Interaction Handlers ---

        function onPointerDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
            // Stop auto-spin when grabbed
            rotationVelocity = { x: 0, y: 0 };
        }

        function onPointerMove(e) {
            if (isDragging && logoGroup) {
                const deltaMove = {
                    x: e.clientX - previousMousePosition.x,
                    y: e.clientY - previousMousePosition.y
                };

                // Apply rotation directly
                logoGroup.rotation.y += deltaMove.x * 0.01;
                logoGroup.rotation.x += deltaMove.y * 0.01;

                // Save momentum
                rotationVelocity.x = deltaMove.y * 0.001;
                rotationVelocity.y = deltaMove.x * 0.001;

                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        }

        function onPointerUp() {
            isDragging = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Animation Loop ---

        function animate() {
            requestAnimationFrame(animate);

            if (logoGroup && !isDragging) {
                // Apply momentum
                logoGroup.rotation.x += rotationVelocity.x;
                logoGroup.rotation.y += rotationVelocity.y;

                // Apply friction (slows down to a steady baseline spin)
                rotationVelocity.x *= 0.95;
                rotationVelocity.y *= 0.95;

                // Enforce a minimum baseline spin on the Y axis
                if (Math.abs(rotationVelocity.y) < 0.005) {
                    rotationVelocity.y += 0.0002; // Gently accelerate back to idle spin
                }
                
                // Drift X axis back to level (0)
                if (Math.abs(rotationVelocity.x) < 0.01) {
                    logoGroup.rotation.x += (0 - logoGroup.rotation.x) * 0.05;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
