<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoCA Slide Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus+SC&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style id="sheet">
  :root{--bone:#EAE3D5;--ink:#17120D;--ash:#6E6557;--red:#E61C28;}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:#1b1814;color:#d9d2c4;font-family:"EB Garamond",Georgia,serif;-webkit-font-smoothing:antialiased;}
  button,select,input,textarea{font-family:inherit;color:inherit}
  ::selection{background:var(--red);color:#fff}

  .wrap-app{max-width:1300px;margin:0 auto;padding:16px;}
  header.bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;border-bottom:1px solid #322c24;padding-bottom:14px;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Marcellus SC";letter-spacing:.14em;text-transform:uppercase;font-size:13px;color:#efe7d7;}
  .brand .dot{width:30px;height:16px;display:inline-flex;align-items:center}
  .brand .dot img,.brand .dot svg{height:16px;width:auto}
  .spacer{flex:1}
  .ctrl{display:flex;align-items:center;gap:7px;font-size:12px;color:#9a9182;text-transform:uppercase;letter-spacing:.08em;}
  select,.btn,input[type=text],textarea{background:#262019;border:1px solid #3a332a;border-radius:8px;padding:8px 10px;font-size:13px;color:#e7e0d2;outline:none;}
  select:focus,input:focus,textarea:focus,.btn:focus-visible{border-color:#6b5f4d}
  .btn{cursor:pointer;white-space:nowrap;}
  .btn:hover{border-color:#564c3e;background:#2c251d;}
  .btn.primary{background:var(--red);border-color:var(--red);color:#fff;}
  .btn.primary:hover{filter:brightness(1.08)}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;}
  .chip{flex:0 0 auto;min-width:52px;height:52px;border-radius:9px;border:1px solid #3a332a;background:#221c15;color:#9a9182;display:flex;align-items:center;justify-content:center;font-family:"Marcellus SC";font-size:14px;cursor:pointer;position:relative;}
  .chip.active{border-color:var(--red);color:#efe7d7;box-shadow:0 0 0 1px var(--red) inset;}
  .chip .x{position:absolute;top:-7px;right:-7px;width:19px;height:19px;border-radius:50%;background:#3a332a;color:#eee;font-size:12px;line-height:19px;text-align:center;}
  .chip.add{border-style:dashed;font-size:20px;color:#7c7363}

  .studio{display:grid;grid-template-columns:1fr;gap:18px;}
  @media(min-width:1000px){.studio{grid-template-columns:minmax(0,1fr) 388px;align-items:start;}}

  .stage{background:#0f0d0b;border:1px solid #2a251e;border-radius:14px;padding:22px;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:320px;}
  #frame{position:relative;overflow:hidden;}
  #frame > .scaler{position:absolute;top:0;left:0;transform-origin:top left;}
  .traybtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}

  /* ===================== SLIDE ===================== */
  .slide{position:relative;overflow:hidden;isolation:isolate;display:flex;flex-direction:column;background:var(--bone);color:var(--ink);font-size:var(--base,30px);--hair:rgba(23,18,13,.22);padding:var(--padY) var(--padX);}
  .slide.dark{background:var(--ink);color:var(--bone);--hair:rgba(234,227,213,.26);}
  .bgimg,.ghost{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}
  .slide::after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(23,18,13,.07);z-index:3;}
  .slide.dark::after{box-shadow:inset 0 0 0 1px rgba(234,227,213,.09);}
  .eyebrow,.bodyz,.colophon{position:relative;z-index:1;}

  .eyebrow{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;padding-bottom:.6em;border-bottom:1.5px solid var(--hair);min-height:1.4em;}
  .eyebrow.empty{border-bottom:none;padding-bottom:0;min-height:0;}
  .eyebrow .ey{font-family:"Marcellus SC";letter-spacing:.16em;text-transform:uppercase;font-size:.8em;line-height:1.3;}
  .eyebrow .nm{font-family:"Marcellus SC";letter-spacing:.08em;font-size:1.0em;color:var(--red);white-space:nowrap;}
  .markcorner{width:3.04em;height:1.5em;}

  .bodyz{flex:1;display:flex;flex-direction:column;min-height:0;}
  .bodyz.vt{justify-content:flex-start}.bodyz.vm{justify-content:center}.bodyz.vb{justify-content:flex-end}
  .fit{width:100%}
  .fit::after{content:"";display:table;clear:both;}
  .al-center .fit{text-align:center}

  .lockup{display:block;width:7.2em;height:3.556em;margin:0 0 .55em;}
  .al-center .lockup{margin-left:auto;margin-right:auto;}

  .kicker{font-family:"Marcellus SC";text-transform:uppercase;letter-spacing:.2em;font-size:.86em;color:var(--ash);margin:0 0 .5em;}
  .slide.dark .kicker{color:#b8ae9c;}
  .display{font-family:"Cormorant Garamond";font-weight:600;line-height:1.0;letter-spacing:-.01em;margin:0;}
  .size-s .display{font-size:2.75em}
  .size-m .display{font-size:3.55em}
  .size-l .display{font-size:4.45em}
  .size-xl .display{font-size:5.75em}
  .lede{font-family:"EB Garamond";font-style:italic;font-size:1.3em;line-height:1.34;color:var(--ash);margin:.5em 0 0;}
  .slide.dark .lede{color:#c5bca9;}
  .prose{font-family:"EB Garamond";font-size:1.3em;line-height:1.48;margin:.6em 0 0;}
  .bsub{font-family:"Marcellus SC";text-transform:uppercase;letter-spacing:.14em;font-size:.92em;color:var(--ash);margin:.72em 0 0;}
  .scripture{display:flex;flex-direction:column;gap:.28em;margin:.62em 0 0;padding-left:.7em;border-left:5px solid var(--red);}
  .al-center .scripture{border-left:none;padding-left:0;border-top:4px solid var(--red);padding-top:.42em;align-items:center;}
  .scripture q{font-family:"Cormorant Garamond";font-weight:500;font-size:1.95em;line-height:1.16;quotes:none;}
  .scripture .src{font-family:"IBM Plex Mono";font-size:.74em;letter-spacing:.02em;color:var(--ash);}
  ul.blist{margin:.55em 0 0;padding:0;list-style:none;}
  ul.blist li{font-family:"EB Garamond";font-size:1.26em;line-height:1.4;padding-left:1.15em;position:relative;margin:.22em 0;}
  ul.blist li::before{content:"";position:absolute;left:0;top:.6em;width:.42em;height:.42em;background:var(--red);}
  .al-center ul.blist{display:inline-block;text-align:left}
  hr.brk{border:none;border-top:1.5px solid var(--hair);margin:.72em 0 0;width:34%;}
  .al-center hr.brk{margin-left:auto;margin-right:auto;}

  .wrapfig{margin:.1em 0 .35em;}
  .wrapfig.left{float:left;margin-right:1em;}
  .wrapfig.right{float:right;margin-left:1em;}
  .wrapfig.s{width:34%}.wrapfig.m{width:46%}.wrapfig.l{width:60%}
  .wrapfig img{display:block;width:100%;height:auto;border:1px solid var(--hair);}
  .al-center .wrapfig{float:none;margin-left:auto;margin-right:auto;}

  .colophon{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding-top:.58em;border-top:1.5px solid var(--hair);}
  .colophon.empty{border-top:none;padding-top:0;}
  .colophon .url{font-family:"IBM Plex Mono";font-size:.8em;word-break:break-all;}
  .colophon .url .pp{color:var(--red);}
  .colophon .tense{font-family:"Marcellus SC";text-transform:uppercase;letter-spacing:.14em;font-size:.62em;color:var(--ash);white-space:nowrap;text-align:right;}

  /* ===================== EDITOR ===================== */
  .editor{display:flex;flex-direction:column;gap:14px;}
  .pcard{background:#211b15;border:1px solid #322c24;border-radius:12px;padding:14px;}
  .pcard h3{margin:0 0 12px;font-family:"Marcellus SC";letter-spacing:.13em;text-transform:uppercase;font-size:11px;color:#cfc6b5;}
  .grp{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:12px;}
  .grp:last-child{margin-bottom:0}
  .lab{display:flex;flex-direction:column;gap:6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8f8676;}
  .lab.wide{flex:1;min-width:160px}
  .lab input,.lab textarea,.lab select{width:100%}
  textarea{resize:vertical;min-height:40px;line-height:1.4;width:100%}
  .seg{display:inline-flex;border:1px solid #3a332a;border-radius:8px;overflow:hidden;}
  .seg button{background:#241e17;border:none;border-right:1px solid #3a332a;padding:7px 11px;font-size:12px;color:#aaa091;cursor:pointer;}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--red);color:#fff;}
  .blocks{display:flex;flex-direction:column;gap:9px;}
  .blk{border:1px solid #322c24;border-radius:9px;padding:9px;background:#1d1812;}
  .blk .bh{display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:10px;color:#8f8676;text-transform:uppercase;letter-spacing:.1em;}
  .blk .bh .g{flex:1}
  .mini{background:transparent;border:1px solid #3a332a;border-radius:6px;color:#bdb4a3;font-size:12px;padding:4px 8px;cursor:pointer;line-height:1;}
  .mini:hover{border-color:#564c3e}
  .mini.red:hover{border-color:var(--red);color:#fff}
  .addrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .hint{font-size:11px;color:#7c7363;margin-top:9px;line-height:1.45;}
  .filebar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .fileinfo{font-size:11px;color:#8f8676}
  input[type=file]{display:none}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#0e0c0a;border:1px solid #3a332a;color:#e7e0d2;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;}
  .toast.show{opacity:1}
</style>
</head>

    s.style.setProperty('--padX',Math.round(RATIO.w*0.076)+'px');
    s.style.setProperty('--padY',Math.round(RATIO.h*0.055)+'px');
    var html='';
    var bgon=slide.img&&slide.img.mode==='bg'&&slide.img.src;
    if(bgon){var bg=getProcessed(slide);if(bg)html+='<img class="bgimg" src="'+bg+'" alt="">';}
    if(slide.gesture&&!bgon){var gu=gestureURL(slide,idx);if(gu)html+='<img class="ghost" src="'+gu+'" alt="">';}
    /* eyebrow */
    var eyL=esc(slide.eyebrow||'');
    var eyR='';
    if(slide.logo==='corner') eyR=emblem('markcorner');
    else if(slide.showNum) eyR='<span class="nm">'+pad(idx+1)+'</span>';
    var eyEmpty=(!eyL&&!eyR);
    html+='<div class="eyebrow'+(eyEmpty?' empty':'')+'"><span class="ey">'+eyL+'</span>'+eyR+'</div>';
    /* body */
    var inner='';
    if(slide.logo==='lockup') inner+=emblem('lockup');
    if(slide.kicker) inner+='<p class="kicker">'+esc(slide.kicker)+'</p>';
    if(slide.title) inner+='<h1 class="display">'+inl(slide.title)+'</h1>';
    var wrapon=slide.img&&slide.img.mode==='wrap'&&slide.img.src;
    if(wrapon){var wu=getProcessed(slide)||slide.img.src;inner+='<figure class="wrapfig '+(slide.img.side==='left'?'left':'right')+' '+(slide.img.size||'m')+'"><img src="'+wu+'" alt=""></figure>';}
    inner+=renderBlocks(slide.blocks);
    var anc=slide.anchor==='top'?'vt':slide.anchor==='bot'?'vb':'vm';
    html+='<div class="bodyz '+anc+'"><div class="fit">'+inner+'</div></div>';
    /* colophon */
    var coL=slide.link?'<span class="url">'+fmtUrl(slide.link)+'</span>':'<span></span>';
    var coR=slide.tagline?'<span class="tense">'+esc(slide.tagline)+'</span>':'';
    var coEmpty=(!slide.link&&!slide.tagline);
    html+='<div class="colophon'+(coEmpty?' empty':'')+'">'+coL+coR+'</div>';
    s.innerHTML=html;
    return s;
  }
  var FIT_MIN=13;
  function fit(sld){
    var body=sld.querySelector('.bodyz'),f=sld.querySelector('.fit');if(!body||!f)return;
    var b=Math.round(RATIO.h/45),g=0;sld.style.setProperty('--base',b+'px');
    while(f.offsetHeight>body.clientHeight+1&&b>FIT_MIN&&g<60){b-=1;sld.style.setProperty('--base',b+'px');g++;}
  }

  /* ---------- preview ---------- */
  function renderPreview(){
    var sld=renderSlideEl(S(),state.cur);
    ref.scaler.innerHTML='';ref.scaler.appendChild(sld);
    requestAnimationFrame(function(){fit(sld);scaleStage();});
  }
  function scaleStage(){
    var availW=ref.stage.clientWidth-44;
    var availH=Math.max(300,Math.min(window.innerHeight*0.72,920));
    var k=Math.min(availW/RATIO.w,availH/RATIO.h,1);
    ref.scaler.style.transform='scale('+k+')';
    ref.scaler.style.width=RATIO.w+'px';ref.scaler.style.height=RATIO.h+'px';
    ref.frame.style.width=(RATIO.w*k)+'px';ref.frame.style.height=(RATIO.h*k)+'px';
  }

  /* ---------- chips ---------- */
  function renderChips(){
    var c=ref.chips;c.innerHTML='';
    state.slides.forEach(function(s,i){
      var d=document.createElement('div');d.className='chip'+(i===state.cur?' active':'');d.dataset.i=i;
      d.innerHTML=pad(i+1)+(state.slides.length>1?'<span class="x" data-x="'+i+'">\u00d7</span>':'');
      c.appendChild(d);
    });
    var add=document.createElement('div');add.className='chip add';add.dataset.add='1';add.textContent='+';c.appendChild(add);
  }

  /* ---------- editor ---------- */
  function seg(k,pairs,cur){return '<div class="seg">'+pairs.map(function(p){return '<button data-k="'+k+'" data-v="'+p[0]+'" class="'+(cur===p[0]?'on':'')+'">'+p[1]+'</button>';}).join('')+'</div>';}
  function tog(k,on){return '<div class="seg"><button data-k="'+k+'" data-v="1" class="'+(on?'on':'')+'">On</button><button data-k="'+k+'" data-v="0" class="'+(!on?'on':'')+'">Off</button></div>';}
  function blockEditor(blocks){
    if(!blocks||!blocks.length) return '<div class="hint">No blocks yet. Add a paragraph, quote, list, sub-label, or rule below.</div>';
    return '<div class="blocks">'+blocks.map(function(b,i){
      var name=b.t==='p'?'Paragraph':b.t==='q'?'Quote':b.t==='list'?'List':b.t==='sub'?'Sub-label':'Rule';
      var body='';
      if(b.t==='p'||b.t==='sub') body='<textarea data-bi="'+i+'" data-bk="text" rows="2" placeholder="Text\u2026">'+esc(b.text||'')+'</textarea>';
      else if(b.t==='q') body='<textarea data-bi="'+i+'" data-bk="text" rows="2" placeholder="Quote\u2026">'+esc(b.text||'')+'</textarea><input type="text" data-bi="'+i+'" data-bk="src" placeholder="Source (optional)" value="'+esc(b.src||'')+'" style="margin-top:6px">';
      else if(b.t==='list') body='<textarea data-bi="'+i+'" data-bk="items" rows="3" placeholder="One item per line">'+esc((b.items||[]).join('\n'))+'</textarea>';
      else if(b.t==='hr') body='<div class="hint" style="margin:0">A short horizontal rule.</div>';
      return '<div class="blk"><div class="bh"><span>'+name+'</span><span class="g"></span>'+
        '<button class="mini" data-act="up-'+i+'">\u2191</button><button class="mini" data-act="down-'+i+'">\u2193</button><button class="mini red" data-act="del-'+i+'">Remove</button></div>'+body+'</div>';
    }).join('')+'</div>';
  }
  function renderEditor(){
    var s=S();var im=s.img||blankImg();
    var h='';
    /* Layout */
    h+='<div class="pcard"><h3>Layout</h3>'+
      '<div class="grp"><div class="lab">Tone'+seg('tone',[['light','Bone'],['dark','Ink']],s.tone)+'</div>'+
      '<div class="lab">Align'+seg('align',[['left','Left'],['center','Center']],s.align)+'</div>'+
      '<div class="lab">Anchor'+seg('anchor',[['top','Top'],['mid','Middle'],['bot','Bottom']],s.anchor)+'</div></div>'+
      '<div class="grp"><div class="lab">Title size'+seg('size',[['s','S'],['m','M'],['l','L'],['xl','XL']],s.size)+'</div>'+
      '<div class="lab">Logo'+seg('logo',[['none','None'],['corner','Corner'],['lockup','Lockup']],s.logo)+'</div></div>'+
      '<div class="grp"><div class="lab">Gesture'+tog('gesture',s.gesture)+'</div>'+
      '<div class="lab">Number'+tog('showNum',s.showNum)+'</div></div></div>';
    /* Content */
    h+='<div class="pcard"><h3>Content</h3>'+
      '<div class="grp"><label class="lab wide">Eyebrow (top rail)<input type="text" data-k="eyebrow" value="'+esc(s.eyebrow||'')+'" placeholder="e.g. The Doctrine"></label></div>'+
      '<div class="grp"><label class="lab wide">Kicker<input type="text" data-k="kicker" value="'+esc(s.kicker||'')+'" placeholder="small-caps intro"></label></div>'+
      '<div class="grp"><label class="lab wide">Title<textarea data-k="title" rows="2" placeholder="Headline\u2026">'+esc(s.title||'')+'</textarea></label></div>'+
      blockEditor(s.blocks)+
      '<div class="addrow"><button class="mini" data-act="add-p">+ Paragraph</button><button class="mini" data-act="add-q">+ Quote</button><button class="mini" data-act="add-list">+ List</button><button class="mini" data-act="add-sub">+ Sub-label</button><button class="mini" data-act="add-hr">+ Rule</button></div>'+
      '<div class="hint">Inline: **bold**, *italic*, and line breaks all work.</div></div>';
    /* Link + footer */
    h+='<div class="pcard"><h3>Link &amp; footer</h3>'+
      '<div class="grp"><label class="lab wide">Link (anywhere \u2014 shown bottom-left)<input type="text" data-k="link" value="'+esc(s.link||'')+'" placeholder="https://\u2026"></label></div>'+
      '<div class="grp"><label class="lab wide">Footer tagline (bottom-right \u2014 blank to hide)<input type="text" data-k="tagline" value="'+esc(s.tagline||'')+'"></label></div></div>';
    /* Image */
    var imgInfo=im.src?'Image loaded':'No image';
    h+='<div class="pcard"><h3>Image</h3>'+
      '<div class="grp"><div class="filebar"><button class="mini" data-act="pick-img">'+(im.src?'Replace image':'Upload image')+'</button>'+(im.src?'<button class="mini red" data-act="rm-img">Remove</button>':'')+'<span class="fileinfo">'+imgInfo+'</span></div></div>'+
      '<div class="grp"><div class="lab">Placement'+seg('imgmode',[['none','None'],['wrap','Wrap'],['bg','Background']],im.mode)+'</div></div>';
    if(im.mode==='wrap'){
      h+='<div class="grp"><div class="lab">Side'+seg('imgside',[['left','Left'],['right','Right']],im.side)+'</div>'+
        '<div class="lab">Size'+seg('imgsize',[['s','S'],['m','M'],['l','L']],im.size)+'</div>'+
        '<div class="lab">Sepia'+tog('sepia',im.sepia)+'</div></div>';
    }else if(im.mode==='bg'){
      h+='<div class="grp"><div class="lab">Sepia'+tog('sepia',im.sepia)+'</div>'+
        '<div class="lab">Wash'+seg('scrim',[['low','Light'],['med','Medium'],['high','Heavy']],im.scrim)+'</div></div>'+
        '<div class="hint">Background images sit under a sepia wash so text stays legible. Heavier wash = more readable.</div>';
    }else{
      h+='<div class="hint">Upload a picture, then choose <b>Wrap</b> (text flows around it) or <b>Background</b> (fills the card, sepia).</div>';
    }
    h+='</div>';
    ref.editor.innerHTML=h;
  }

  function full(){renderChips();renderEditor();renderPreview();autosave();}
  var rpT;function softRender(){clearTimeout(rpT);rpT=setTimeout(function(){renderPreview();renderChips();autosave();},70);}

  /* ---------- event wiring ---------- */
  function wire(){
    ref.editor.addEventListener('input',function(e){
      var t=e.target;
      if(t.dataset.bi!==undefined){applyBlock(t);return;}
      if(t.dataset.k!==undefined&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA')){S()[t.dataset.k]=t.value;softRender();}
    });
    ref.editor.addEventListener('click',function(e){
      var b=e.target.closest('button');if(!b)return;
      if(b.dataset.k!==undefined&&b.dataset.v!==undefined){pickSeg(b);return;}
      if(b.dataset.act){blockAct(b.dataset.act);return;}
    });
    ref.chips.addEventListener('click',function(e){
      var x=e.target.closest('[data-x]');if(x){var i=+x.dataset.x;if(state.slides.length>1){state.slides.splice(i,1);if(state.cur>=state.slides.length)state.cur=state.slides.length-1;full();}return;}
      var add=e.target.closest('[data-add]');if(add){state.slides.push(newSlide());state.cur=state.slides.length-1;full();return;}
      var ch=e.target.closest('[data-i]');if(ch){state.cur=+ch.dataset.i;full();}
    });
    ref.ratio.addEventListener('change',function(){state.ratio=this.value;RATIO=RATIOS[this.value];renderPreview();autosave();});
    $('addSlide').onclick=function(){state.slides.push(newSlide());state.cur=state.slides.length-1;full();};
    $('dupSlide').onclick=function(){var copy=JSON.parse(JSON.stringify(S()));state.slides.splice(state.cur+1,0,copy);state.cur++;full();};
    $('moveL').onclick=function(){if(state.cur>0){var x=state.slides.splice(state.cur,1)[0];state.slides.splice(state.cur-1,0,x);state.cur--;full();}};
    $('moveR').onclick=function(){if(state.cur<state.slides.length-1){var x=state.slides.splice(state.cur,1)[0];state.slides.splice(state.cur+1,0,x);state.cur++;full();}};
    $('exportOne').onclick=exportOne;
    $('exportAll').onclick=exportAll;
    $('saveBtn').onclick=function(){lsSet('coca-studio',JSON.stringify(state));toast('Saved to this browser');};
    $('loadBtn').onclick=function(){var v=lsGet('coca-studio');if(!v){toast('Nothing saved yet');return;}try{state=JSON.parse(v);RATIO=RATIOS[state.ratio]||RATIOS['4:5'];ref.ratio.value=state.ratio;state.cur=Math.min(state.cur||0,state.slides.length-1);full();toast('Loaded');}catch(e){toast('Could not load');}};
    $('jsonOut').onclick=function(){dl(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),'coca-slides.json');};
    $('jsonIn').onclick=function(){ref.jsonFile.click();};
    $('siteBtn').onclick=downloadEditor;
    ref.imgFile.addEventListener('change',function(){var f=this.files&&this.files[0];if(!f){return;}var rd=new FileReader();rd.onload=function(){var s=S();s.img=s.img||blankImg();s.img.src=rd.result;s.img.v=(s.img.v||0)+1;if(s.img.mode==='none')s.img.mode='bg';renderEditor();renderPreview();autosave();};rd.readAsDataURL(f);this.value='';});
    ref.jsonFile.addEventListener('change',function(){var f=this.files&&this.files[0];if(!f){return;}var rd=new FileReader();rd.onload=function(){try{state=JSON.parse(rd.result);RATIO=RATIOS[state.ratio]||RATIOS['4:5'];ref.ratio.value=state.ratio;state.cur=Math.min(state.cur||0,state.slides.length-1);full();toast('Imported');}catch(e){toast('Invalid JSON');}};rd.readAsText(f);this.value='';});
    window.addEventListener('resize',function(){scaleStage();});
  }
  function pickSeg(b){
    var k=b.dataset.k,v=b.dataset.v,s=S();s.img=s.img||blankImg();
    if(k==='gesture')s.gesture=(v==='1');
    else if(k==='showNum')s.showNum=(v==='1');
    else if(k==='sepia')s.img.sepia=(v==='1');
    else if(k==='imgmode')s.img.mode=v;
    else if(k==='imgside')s.img.side=v;
    else if(k==='imgsize')s.img.size=v;
    else if(k==='scrim')s.img.scrim=v;
    else s[k]=v;
    renderEditor();renderPreview();renderChips();autosave();
  }
  function blockAct(a){
    var s=S();s.blocks=s.blocks||[];
    if(a==='pick-img'){ref.imgFile.click();return;}
    if(a==='rm-img'){s.img=blankImg();renderEditor();renderPreview();autosave();return;}
    if(a.indexOf('add-')===0){var ty=a.slice(4);var nb=ty==='q'?{t:'q',text:'',src:''}:ty==='list'?{t:'list',items:['']}:ty==='sub'?{t:'sub',text:''}:ty==='hr'?{t:'hr'}:{t:'p',text:''};s.blocks.push(nb);}
    else if(a.indexOf('del-')===0)s.blocks.splice(+a.slice(4),1);
    else if(a.indexOf('up-')===0){var i=+a.slice(3);if(i>0){var x=s.blocks.splice(i,1)[0];s.blocks.splice(i-1,0,x);}}
    else if(a.indexOf('down-')===0){var j=+a.slice(5);if(j<s.blocks.length-1){var y=s.blocks.splice(j,1)[0];s.blocks.splice(j+1,0,y);}}
    renderEditor();renderPreview();autosave();
  }
  function applyBlock(t){var i=+t.dataset.bi,bk=t.dataset.bk,s=S(),blk=s.blocks[i];if(!blk)return;if(bk==='items')blk.items=t.value.split('\n');else blk[bk]=t.value;softRender();}

  /* ---------- storage ---------- */
  var MEM={};
  function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){MEM[k]=v;}}
  function lsGet(k){try{var v=localStorage.getItem(k);return v==null?(k in MEM?MEM[k]:null):v;}catch(e){return k in MEM?MEM[k]:null;}}
  var asT;function autosave(){clearTimeout(asT);asT=setTimeout(function(){lsSet('coca-studio',JSON.stringify(state));},600);}

  /* ---------- export ---------- */
  function fname(i){return pad(i+1)+'-'+slug(state.slides[i].title||state.slides[i].eyebrow)+'-'+state.ratio.replace(':','x')+'.png';}
  function imgsReady(el){return Promise.all([].slice.call(el.querySelectorAll('img')).map(function(im){return (im.complete&&im.naturalWidth)?Promise.resolve():new Promise(function(res){im.onload=im.onerror=function(){res();};});}));}
  async function snap(idx){
    try{await RASTERS;}catch(e){}
    var slide=state.slides[idx];
    await ensureProcessed(slide);
    var el=renderSlideEl(slide,idx);
    el.style.position='fixed';el.style.left='-12000px';el.style.top='0';el.style.margin='0';
    document.body.appendChild(el);
    try{await document.fonts.ready;}catch(e){}
    await new Promise(function(r){requestAnimationFrame(function(){requestAnimationFrame(r);});});
    fit(el);
    await imgsReady(el);
    var canvas=await html2canvas(el,{scale:2,backgroundColor:slide.tone==='dark'?'#17120D':'#EAE3D5',width:RATIO.w,height:RATIO.h,windowWidth:RATIO.w,windowHeight:RATIO.h,useCORS:true,logging:false});
    el.remove();return canvas;
  }
  async function exportOne(){try{toast('Rendering\u2026');var c=await snap(state.cur);c.toBlob(function(b){dl(b,fname(state.cur));toast('Saved slide '+(state.cur+1));},'image/png');}catch(e){toast('Export failed');}}
  async function exportAll(){
    try{
      toast('Rendering '+state.slides.length+' slides\u2026');
      var zip=new JSZip(),i,c,blob;
      for(i=0;i<state.slides.length;i++){c=await snap(i);blob=await new Promise(function(r){c.toBlob(r,'image/png');});zip.file(fname(i),blob);}
      var out=await zip.generateAsync({type:'blob'});
      dl(out,'coca-slides-'+state.ratio.replace(':','x')+'.zip');
      toast('Exported '+state.slides.length+' slides');
    }catch(e){toast('Export failed');}
  }

  /* ---------- download a standalone copy ---------- */
  function downloadEditor(){
    var css=document.getElementById('sheet').textContent;
    var app=document.getElementById('app').textContent;
    var SCRIPT='scr'+'ipt';
    var data=JSON.stringify(state).replace(/</g,'\\u003c');
    var doc='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="utf-8">\n<meta name="viewport" content="width=device-width, initial-scale=1">\n<title>CoCA Slide Studio</title>\n'+
      FONTS+'\n<'+SCRIPT+' src="'+H2C+'"></'+SCRIPT+'>\n<'+SCRIPT+' src="'+JSZ+'"></'+SCRIPT+'>\n<style id="sheet">'+css+'</style>\n</head>\n<body>\n<div id="mount"></div>\n'+
      '<'+SCRIPT+' type="application/json" id="seed">'+data+'</'+SCRIPT+'>\n<'+SCRIPT+' id="app">'+app+'</'+SCRIPT+'>\n</body>\n</html>';
    dl(new Blob([doc],{type:'text/html'}),'coca-slide-studio.html');
    toast('Downloaded a standalone editor');
  }

  /* ---------- init ---------- */
  function init(){
    document.getElementById('mount').innerHTML=SKELE;
    ['ratio','chips','stage','frame','scaler','editor','imgFile','jsonFile','toast'].forEach(function(id){ref[id]=$(id);});
    var seed=document.getElementById('seed');
    if(seed){try{state=JSON.parse(seed.textContent);}catch(e){}}
    else{var sv=lsGet('coca-studio');if(sv){try{state=JSON.parse(sv);}catch(e){}}}
    if(!state||!state.slides||!state.slides.length)state=defaultState();
    RATIO=RATIOS[state.ratio]||RATIOS['4:5'];ref.ratio.value=state.ratio;
    if(state.cur==null||state.cur>=state.slides.length)state.cur=0;
    wire();full();
    RASTERS.then(function(){
      if(LOGO_URL)$('brandDot').innerHTML='<img src="'+LOGO_URL+'" alt="">';
      renderPreview();renderChips();
    });
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(renderPreview);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
